stages:
  - lint
  - test
  - build
  - deploy

# ------------------------------------------------------------
# Lint stage
# - Backend: Java/Spring (Gradle)
# - Frontend: React (npm + eslint via react-scripts)
# ------------------------------------------------------------

lint_backend:
  stage: lint
  image: gradle:8-jdk21
  script:
    # Run lightweight Gradle checks (can be expanded with Spotless/Checkstyle later)
    - cd backend
    - ./gradlew --no-daemon check
  artifacts:
    when: always
    paths:
      - backend/build/reports

lint_frontend:
  stage: lint
  image: node:20
  script:
    - cd frontend
    - npm ci
    # Fail the pipeline on frontend lint errors.
    - npx eslint src

# ------------------------------------------------------------
# Test stage
# - Backend unit tests
# - Frontend tests (if present)
# ------------------------------------------------------------

test_backend:
  stage: test
  image: gradle:8-jdk21
  script:
    - cd backend
    - ./gradlew --no-daemon test

test_frontend:
  stage: test
  image: node:20
  script:
    - cd frontend
    - npm ci
    - CI=true npm test -- --watchAll=false

# ------------------------------------------------------------
# Build stage
# - Build backend jar
# - Build frontend bundle
# ------------------------------------------------------------

build_backend:
  stage: build
  image: gradle:8-jdk21
  script:
    - cd backend
    - ./gradlew --no-daemon bootJar
  artifacts:
    paths:
      - backend/build/libs
    expire_in: 1 week
  needs:
    - test_backend

build_frontend:
  stage: build
  image: node:20
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - frontend/build
    expire_in: 1 week
  needs:
    - test_frontend

# ------------------------------------------------------------
# Deploy stage
# - Runs only on main
# - SSH into GCE VM, sync repo into shared app dir, then docker compose up
# - Expects CI variables: VM_HOST, VM_USER, SSH_PRIVATE_KEY
# - Optional CI variable: DEPLOY_PATH (defaults to /opt/star-stalker/app)
# ------------------------------------------------------------

deploy_to_vm:
  stage: deploy
  image: alpine:3.19
  variables:
    DEPLOY_PATH: /opt/star-stalker/app
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apk add --no-cache openssh-client rsync
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts
  script:
    - rsync -az --delete --exclude '.git' --exclude '.env.prod' ./ "$VM_USER@$VM_HOST:$DEPLOY_PATH/"
    - ssh "$VM_USER@$VM_HOST" "
        cd $DEPLOY_PATH &&
        docker compose --env-file .env.prod -f docker-compose.yml -f docker-compose.cloud.yml up -d --build --remove-orphans
      "
