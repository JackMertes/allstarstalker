spring.application.name=backend

spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Ingestion: delay between teams (ms) when doing full refresh
ingestion.delay-between-teams-ms=12000
# Ingestion: path for flight_refresh.log (override with INGESTION_LOG_PATH in Docker)
ingestion.log-path=${INGESTION_LOG_PATH:database/flight_refresh.log}
