spring.datasource.url=jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:nba_flight_tracker}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
spring.datasource.username=${DB_USER:flight_user}
spring.datasource.password=${DB_PASSWORD:ci_password}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=4

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.task.scheduling.enabled=false
ingestion.delay-between-teams-ms=0
logging.level.root=WARN
